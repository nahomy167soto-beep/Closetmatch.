<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>ClosetMatch</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* contenedor general */

.container{
display:flex;
height:100vh;
}

/* panel izquierdo */

.catalogo{
width:40%;
background:white;
padding:20px;
overflow-y:scroll;
border-right:1px solid #ddd;
}

.catalogo h2{
margin-top:0;
}

.search{
width:100%;
padding:10px;
margin-bottom:20px;
}

/* grid de ropa */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.item{
background:#f7f7f7;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.item:hover{
transform:scale(1.05);
}

.item img{
width:100%;
}

/* panel derecho */

.preview{
width:60%;
display:flex;
justify-content:center;
align-items:center;
background:#eaeaea;
position:relative;
}

/* modelo */

.modelo{
width:300px;
}

/* ropa encima del modelo */

.overlay{
position:absolute;
width:200px;
top:200px;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL IZQUIERDO -->

<div class="catalogo">

<h2>ClosetMatch</h2>

<input class="search" placeholder="Buscar ropa...">

<div class="grid">

<div class="item" onclick="cambiar('top1.png')">
<img src="https://i.imgur.com/4QfKuz1.png">
<p>Top negro</p>
</div>

<div class="item" onclick="cambiar('top2.png')">
<img src="https://i.imgur.com/y9MIaCS.png">
<p>Top cuero</p>
</div>

<div class="item" onclick="cambiar('dress.png')">
<img src="https://i.imgur.com/F5Z8B6K.png">
<p>Vestido</p>
</div>

<div class="item" onclick="cambiar('pants.png')">
<img src="https://i.imgur.com/L4XKq8R.png">
<p>Pantalón</p>
</div>

</div>

</div>

<!-- PANEL DERECHO -->

<div class="preview">

<img class="modelo" src="https://i.imgur.com/5ZQZ7QF.png">

<img id="ropa" class="overlay">

</div>

</div>

<script>

function cambiar(imagen){

document.getElementById("ropa").src=imagen

}

</script>

</body>

</html>
