<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>ClosetMatch</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

header{
background:#ff6fa5;
color:white;
padding:20px;
font-size:28px;
}

.closet{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
}

.item{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.item img{
width:100%;
border-radius:8px;
}

button{
padding:12px 20px;
background:#ff6fa5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>ClosetMatch 👗</header>

<h2>Mi Closet</h2>

<div class="closet">

<div class="item">
<img src="imagenes/Top1.png">
<p>Blusa</p>
</div>

<div class="item">
<img src="imagenes/Top2.png">
<p>Chaqueta</p>
</div>

<div class="item">
<img src="imagenes/Vestido.png">
<p>Vestido</p>
</div>

<div class="item">
<img src="imagenes/Pantalon.png">
<p>Pantalon</p>
</div>

<div class="item">
<img src="imagenes/Zapatos.png">
<p>Zapatos</p>
</div>

</div>

<button onclick="generarOutfit()">Generar Outfit</button>

<p id="outfit"></p>

<script>

function generarOutfit(){

const outfits = [

"Blusa + Jeans + Zapatos",

"Vestido + Chaqueta + Zapatos",

"Chaqueta + Jeans + Blusa"

]

let random = Math.floor(Math.random()*outfits.length)

document.getElementById("outfit").innerText =
"Outfit sugerido: " + outfits[random]

}

</script>

</body>
</html>
